dbt_transforms:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{env_var('SNOWFLAKE_ACCOUNT')}}"

      # User/password auth
      user: "{{env_var('SNOWFLAKE_USERNAME')}}"
      password: "{{env_var('SNOWFLAKE_PASSWORD')}}"

      role: ACCOUNTADMIN
      database: raw
      warehouse: COMPUTE_WH
      schema: datacenters
      threads: 16